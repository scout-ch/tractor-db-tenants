on:
  pull_request:

name: Check Pull Request

jobs:
  lint:
    name: "Lint"
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    defaults:
      run:
        working-directory: tofu
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Common Setup
        uses: ./.github/actions/common-setup
        with:
          download_bw: 'false'
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: OpenTofu Format
        id: fmt
        run: tofu fmt -check -recursive -diff

      - name: Generate Comment
        if: success() || failure()
        shell: bash
        run: |
          cat <<EOF>> pretty_lint_result.txt
          #### OpenTofu Format and Style 🖌\`${{ steps.fmt.outcome }}\`

          *Pusher: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*
          EOF

      - name: Annotate PR
        uses: marocchino/sticky-pull-request-comment@v3
        if: success() || failure()
        with:
          header: lint
          path: tofu/pretty_lint_result.txt

      - name: Annotate Run
        if: success() || failure()
        shell: bash
        run: cat pretty_lint_result.txt >> $GITHUB_STEP_SUMMARY

  plan:
    name: "Prepare Plan"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tofu
    permissions:
      contents: read
      pull-requests: write
    env:
      PGPASSWORD: ${{ secrets.PGPASSWORD }}
      BW_CLIENTID: ${{ secrets.BW_CLIENTID }}
      BW_CLIENTSECRET: ${{ secrets.BW_CLIENTSECRET }}
      BW_PASSWORD: ${{ secrets.BW_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Plan
        id: plan
        uses: ./.github/actions/common-plan
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          lock: 'false'

      - name: Annotate PR
        uses: marocchino/sticky-pull-request-comment@v3
        if: success() || failure()
        with:
          header: plan
          path: tofu/pretty_plan_short.txt

      - name: Annotate Run
        if: success() || failure()
        shell: bash
        run: cat pretty_plan.txt >> $GITHUB_STEP_SUMMARY
